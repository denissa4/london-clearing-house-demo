name: docker-publish

# Build the MCP server image and publish it to Docker Hub on every push to main.
# The central IaC repo (Terraform Cloud) then pulls docker.io/denissa4/lch-mcp.
#
# Requires two repo secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  e.g. denissa4
#   DOCKERHUB_TOKEN     a Docker Hub access token with Read/Write on the repo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            denissa4/lch-mcp:latest
            denissa4/lch-mcp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
